<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#FFFBF7;padding:16px 14px 48px}
.wrap{max-width:390px;margin:0 auto}
.back-btn{display:flex;align-items:center;gap:6px;color:#FF7043;font-size:13px;font-weight:700;text-decoration:none;margin-bottom:16px}

.card p{font-size:14px;color:#5D4037;line-height:1.9;margin-bottom:8px}
.card p:last-child{margin-bottom:0}
.note{background:#FFF8E1;border-radius:8px;padding:10px 12px;font-size:13px;color:#5D4037;line-height:1.85;border-left:3px solid #FFD54F;margin:10px 0}
.coming{background:#fff;border:2px dashed #FFD6A0;border-radius:12px;padding:30px 20px;text-align:center;margin-bottom:12px}
.coming p{font-size:13px;color:#A1887F;line-height:1.8}
.lbtn{display:flex;align-items:center;gap:8px;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:500;text-decoration:none;margin:8px 0}
.lbtn-or{border:1px solid #FFCCBC;background:#FFF8F5;color:#BF360C}
.back-btn2{display:block;padding:14px;border-radius:12px;background:#FF7043;color:#fff;text-align:center;font-size:15px;font-weight:700;text-decoration:none;margin-top:20px}
